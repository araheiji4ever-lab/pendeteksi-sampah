<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Deteksi Sampah</title>

<!-- ONNX Runtime -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:
        radial-gradient(circle at top left,#16222A,#0B0F14 50%),
        linear-gradient(135deg,#000000,#0F172A);
    color:white;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
    overflow-x:hidden;
}

.main{
    width:100%;
    max-width:1100px;
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:3rem;
    font-weight:700;
    margin-bottom:10px;
    letter-spacing:2px;
    text-shadow:0 0 25px rgba(0,255,170,.45);
}

.header p{
    opacity:.75;
    font-size:1rem;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.08);
    border-radius:28px;
    padding:25px;
    backdrop-filter:blur(14px);
    box-shadow:
        0 10px 50px rgba(0,0,0,.45),
        inset 0 0 20px rgba(255,255,255,.03);
}

.top-panel{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
    margin-bottom:25px;
}

.info-box{
    background:rgba(255,255,255,.05);
    border-radius:18px;
    padding:20px;
    border:1px solid rgba(255,255,255,.08);
}

.info-title{
    font-size:.85rem;
    opacity:.7;
    margin-bottom:8px;
}

.info-value{
    font-size:1.3rem;
    font-weight:700;
}

#status{
    color:#FFD54F;
}

#prediction{
    color:#00FFAE;
    text-shadow:0 0 15px rgba(0,255,174,.45);
}

.btn-start{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#00C853,#00E676);
    color:black;
    font-size:1rem;
    font-weight:700;
    cursor:pointer;
    transition:.3s;
    margin-bottom:25px;
    box-shadow:0 0 30px rgba(0,255,140,.3);
}

.btn-start:hover{
    transform:translateY(-3px);
    box-shadow:0 0 40px rgba(0,255,140,.5);
}

.container{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    border-radius:24px;
    overflow:hidden;
    border:2px solid rgba(255,255,255,.08);
    background:black;
    box-shadow:
        0 0 40px rgba(0,0,0,.5),
        inset 0 0 20px rgba(255,255,255,.03);
}

video,
canvas#overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
}

canvas#overlay{
    z-index:10;
}

.scanner{
    position:absolute;
    width:100%;
    height:4px;
    background:linear-gradient(90deg,transparent,#00FFAE,transparent);
    box-shadow:0 0 25px #00FFAE;
    animation:scan 2.5s linear infinite;
    z-index:5;
}

@keyframes scan{
    0%{
        top:0%;
    }

    100%{
        top:100%;
    }
}

.footer{
    text-align:center;
    margin-top:18px;
    opacity:.6;
    font-size:.85rem;
}

@media(max-width:768px){

    .header h1{
        font-size:2rem;
    }

    .top-panel{
        grid-template-columns:1fr;
    }

}

</style>
</head>

<body>

<div class="main">

    <div class="header">
        <h1>♻️ AI Deteksi Sampah</h1>
        <p>Powered by ONNX Runtime • Tiara • Desvita • Melinnda</p>
    </div>

    <div class="card">

        <div class="top-panel">

            <div class="info-box">
                <div class="info-title">STATUS SISTEM</div>
                <div id="status" class="info-value">
                    MENUNGGU AKTIVASI
                </div>
            </div>

            <div class="info-box">
                <div class="info-title">HASIL DETEKSI AI</div>
                <div id="prediction" class="info-value">
                    -
                </div>
            </div>

        </div>

        <button id="btn-init" class="btn-start">
            AKTIFKAN KAMERA AI
        </button>

        <div class="container">

            <div class="scanner"></div>

            <video id="webcam" playsinline muted></video>

            <canvas id="overlay" width="640" height="480"></canvas>

        </div>

        <div class="footer">
            Real-time Garbage Detection System using YOLO + ONNX
        </div>

    </div>

</div>

<!-- Canvas Hidden -->
<canvas id="processor" width="640" height="640" style="display:none;"></canvas>

<!-- App Logic -->
<script src="app.js"></script>

</body>
</html>
