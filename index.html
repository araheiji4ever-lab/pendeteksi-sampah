<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Deteksi Sampah</title>
    
    <!-- ONNX Runtime Web untuk menjalankan model langsung di browser -->
    <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>
    
    <style>
        body { 
            background-color: #121212; 
            color: white; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
        }
        .container { 
            position: relative; 
            width: 640px; 
            height: 480px; 
            border: 2px solid #555; 
            border-radius: 10px; 
            overflow: hidden; 
            margin-top: 20px;
        }
        video, canvas#overlay { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 640px; 
            height: 480px; 
        }
        canvas#overlay { 
            z-index: 10; 
            pointer-events: none; 
        }
        #status { 
            margin: 15px; 
            padding: 10px; 
            border-radius: 5px; 
            background: #1e1e1e; 
            border: 1px solid #444; 
            width: 600px; 
            text-align: center; 
        }
        #prediction { 
            margin-top: 10px; 
            padding: 10px; 
            border-radius: 5px; 
            background: #1e1e1e; 
            border: 1px solid #444; 
            width: 600px; 
            text-align: center; 
            font-size: 1.2rem;
            font-weight: bold;
        }
        .btn-start { 
            padding: 12px 30px; 
            font-size: 1.1rem; 
            cursor: pointer; 
            background: #FF3B30; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold; 
        }
        .btn-start:hover { 
            background: #cc2f26; 
        }
    </style>
</head>
<body>

    <h1>♻️ AI Deteksi Sampah</h1>
    <p>Dibuat oleh: [Nama Kalian]</p>
    
    <button id="btn-init" class="btn-start">AKTIFKAN KAMERA</button>
    <div id="status">STATUS: MATI</div>
    <div id="prediction">Prediksi: -</div>

    <div class="container">
        <video id="webcam" playsinline muted></video>
        <canvas id="overlay" width="640" height="480"></canvas>
    </div>

    <canvas id="processor" width="640" height="640" style="display:none;"></canvas>

    <!-- Logika AI -->
    <script src="app.js"></script>
</body>
</html>
