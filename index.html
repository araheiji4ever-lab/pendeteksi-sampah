<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Deteksi Sampah</title>

<!-- ONNX Runtime Web -->
<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web/dist/ort.min.js"></script>

<!-- Font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background: radial-gradient(circle at top left,#16222A,#0B0F14 50%),
                linear-gradient(135deg,#000,#0F172A);
    color:white;
    font-family:'Poppins',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.main{
    width:100%;
    max-width:1000px;
}

.header{
    text-align:center;
    margin-bottom:20px;
}

.header h1{
    font-size:2.5rem;
    text-shadow:0 0 20px rgba(0,255,170,.4);
}

.header p{
    opacity:.7;
}

.card{
    background:rgba(255,255,255,.05);
    border:1px solid rgba(255,255,255,.1);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(12px);
}

.top-panel{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-bottom:20px;
}

.info-box{
    background:rgba(255,255,255,.05);
    padding:15px;
    border-radius:15px;
}

.info-title{
    font-size:.8rem;
    opacity:.7;
}

.info-value{
    font-size:1.2rem;
    font-weight:bold;
}

#status{
    color:#FFD54F;
}

#prediction{
    color:#00FFAE;
}

.btn-start{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#00C853,#00E676);
    font-weight:bold;
    cursor:pointer;
    margin-bottom:15px;
}

.container{
    position:relative;
    width:100%;
    aspect-ratio:4/3;
    background:black;
    border-radius:20px;
    overflow:hidden;
}

video,
canvas#overlay{
    position:absolute;
    width:100%;
    height:100%;
    object-fit:cover;
}

canvas#overlay{
    z-index:10;
}

.scanner{
    position:absolute;
    width:100%;
    height:3px;
    background:linear-gradient(90deg,transparent,#00FFAE,transparent);
    animation:scan 2.5s linear infinite;
    z-index:5;
}

@keyframes scan{
    0%{top:0%}
    100%{top:100%}
}

.footer{
    text-align:center;
    margin-top:10px;
    opacity:.6;
    font-size:.8rem;
}

@media(max-width:768px){
    .top-panel{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<div class="main">

    <div class="header">
        <h1>♻️ AI Deteksi Sampah</h1>
        <p>YOLO + ONNX Runtime Web</p>
    </div>

    <div class="card">

        <div class="top-panel">

            <div class="info-box">
                <div class="info-title">STATUS</div>
                <div id="status" class="info-value">MENUNGGU AKTIVASI</div>
            </div>

            <div class="info-box">
                <div class="info-title">PREDIKSI</div>
                <div id="prediction" class="info-value">-</div>
            </div>

        </div>

        <button id="btn-init" class="btn-start">
            AKTIFKAN KAMERA AI
        </button>

        <div class="container">

            <div class="scanner"></div>

            <video id="webcam" playsinline muted></video>

            <canvas id="overlay" width="640" height="480"></canvas>

        </div>

        <div class="footer">
            Real-time Garbage Detection System
        </div>

    </div>

</div>

<!-- hidden canvas -->
<canvas id="processor" width="640" height="640" style="display:none;"></canvas>

<script src="app.js"></script>

</body>
</html>
